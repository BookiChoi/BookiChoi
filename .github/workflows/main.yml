name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          user: BookiChoi
          filename: github-metrics.svg

          base: header, activity, community, repositories, metadata

          config_timezone: America/Vancouver
          repositories_affiliations: owner,collaborator,organization_member

          # =========================
          # Languages
          # =========================

          plugin_languages: yes
          plugin_languages_details: bytes-size,percentage
          plugin_languages_sections: most-used
          plugin_languages_limit: 8

          # =========================
          # Contribution Calendar
          # =========================

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # =========================
          # Featured Repositories
          # =========================

          plugin_repositories: yes

          plugin_repositories_featured: >
            BookiChoi/BA-Portfolio,
            Talearnt/Front-Talearnt

          plugin_repositories_pinned: 4

          # =========================
          # Topics
          # =========================

          plugin_topics: yes
          plugin_topics_limit: 12
          plugin_topics_mode: icons

          # =========================
          # Lines Changed
          # =========================

          plugin_lines: yes
          plugin_lines_history_limit: 1

          # =========================
          # Stars
          # =========================

          plugin_stars: yes
          plugin_stars_limit: 5

          # =========================
          # Achievements
          # =========================

          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 8

          # =========================
          # Notable Contributions
          # =========================

          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_types: commit
          plugin_notable_repositories: yes

          # =========================
          # Follow-up
          # =========================

          plugin_followup: yes
          plugin_followup_sections: repositories

          # =========================
          # Licenses
          # =========================

          plugin_licenses: yes
          plugin_licenses_setup: npm
          plugin_licenses_ratio: yes

          # =========================
          # Discussions / Reactions
          # =========================

          plugin_reactions: yes
          plugin_reactions_limit: 100

          # =========================
          # Contributors
          # =========================

          plugin_contributors: yes
          plugin_contributors_base: ""
          plugin_contributors_head: master,main

          # =========================
          # Habits (현재 버그 있어서 비활성화)
          # =========================

          plugin_habits: no
